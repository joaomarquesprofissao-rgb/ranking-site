<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>CEM Envio</title>

<style>
body {
  background: #0b2c4d;
  font-family: Arial;
  color: white;
  text-align: center;
}

.container {
  background: #1b4f82;
  padding: 20px;
  border-radius: 10px;
  width: 350px;
  margin: auto;
}

input, select {
  width: 100%;
  padding: 10px;
  margin: 10px 0;
}

button {
  width: 100%;
  padding: 10px;
  background: #0d6efd;
  color: white;
  border: none;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="container">
  <h2>CEM</h2>

  <input id="nick" placeholder="Seu nick">
  
  <select id="atividade">
    <option value="">Selecione</option>
    <option value="elogio">Elogio</option>
    <option value="promocao">Promoção</option>
  </select>

  <input id="comp" placeholder="Link da comprovação">

  <button onclick="enviar()">Enviar</button>
</div>

<script>

const API = "https://script.google.com/macros/s/AKfycbws30w1qw64FGXIyvG6pHPPeiQlxFow2CMjYR8hfwB522Ha99D-uj_0EysiQoUg21M1/exec";

function pontos(atividade){
  if(atividade === "promocao") return 15;
  if(atividade === "elogio") return 5;
  return 0;
}

function enviar(){

  const nick = document.getElementById("nick").value;
  const atividade = document.getElementById("atividade").value;
  const comp = document.getElementById("comp").value;

  // validação simples
  if(!nick || !atividade || !comp){
    alert("Preencha todos os campos!");
    return;
  }

  fetch(API, {
    method: "POST",
    mode: "no-cors", // 🔥 obrigatório pro GitHub Pages
    headers: {
      "Content-Type": "application/json"
    },
    body: JSON.stringify({
      nick: nick,
      atividade: atividade,
      comprovacao: comp,
      pontos: pontos(atividade)
    })
  });

  alert("Enviado com sucesso!");

  // limpar campos
  document.getElementById("nick").value = "";
  document.getElementById("atividade").value = "";
  document.getElementById("comp").value = "";
}

</script>

</body>
</html>
